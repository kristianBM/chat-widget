<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Widget — Dev</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .hero {
        text-align: center;
        padding: 40px;
      }
      h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 12px; }
      p { font-size: 1.1rem; opacity: 0.85; }
      .hint {
        margin-top: 24px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 12px;
        padding: 16px 24px;
        font-size: 0.9rem;
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>Chat Widget</h1>
      <p>Development server running</p>
      <div class="hint">
        The chat bubble should appear in the bottom-right corner.<br />
        Check <code>src/dev.js</code> to modify the dev configuration.
      </div>
    </div>
    <script type="module" src="/src/dev.js"></script>
  </body>
</html>
